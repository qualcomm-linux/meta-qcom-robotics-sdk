local_conf_header:
  resource_limitation: '# Capture the count of cpu cores available from the host.

    CPU_COUNT = "${@oe.utils.cpu_count(at_least=2, at_most=8)}"


    # Number of parallel threads make can run based on cpu cores with a max cap at
    20.

    THREAD_COUNT = "${@oe.utils.cpu_count(at_least=2, at_most=10)}"


    # Determines how many tasks bitbake should run in parallel.

    BB_NUMBER_THREADS ?= "${CPU_COUNT}"


    # Determines how many tasks bitbake should run in parallel during parsing.

    BB_NUMBER_PARSE_THREADS ?= "${CPU_COUNT}"


    # Specifies a maximum CPU pressure threshold for bitbake scheduler to start new
    tasks.

    BB_PRESSURE_MAX_CPU = "800000"


    # Specifies a maximum IO pressure threshold for bitbake scheduler to start new
    tasks.

    BB_PRESSURE_MAX_IO = "800000"


    # Specifies a maximum Memory pressure threshold for bitbake scheduler to start
    new tasks.

    BB_PRESSURE_MAX_MEMORY = "800000"


    # Determines how many processes make should run in parallel when running compile
    tasks.

    PARALLEL_MAKE ?= "-j ${THREAD_COUNT} -l ${THREAD_COUNT}"

    '
  libcamera_mask: '# Disable the libcamera recipe to avoid conflicts with the meta-qcom-distro
    libcamera recipe

    BBMASK .= "|^${TOPDIR}/meta-ros/meta-ros-common/recipes-multimedia/libcamera/.*"

    PREFERRED_VERSION_libcamera = "1:0.6.0"

    '
distro: qcom-robotics-ros2-jazzy
target: qcom-robotics-image
