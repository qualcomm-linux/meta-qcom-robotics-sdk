name: Build on PR
run-name: "${{ github.base_ref }}: ${{ github.event.pull_request.title }}"

on:
  pull_request:
    branches:
      - main
      - wrynose
    paths-ignore:
      - '**/*.md'
      - '.github/.markdownlint.yaml'
  workflow_dispatch:
    inputs:
      use_sstate:
        description: "Use SSTATE cache"
        required: false
        default: "false"

permissions:
  checks: write
  pull-requests: write
  contents: write # Use write access to auto merge PR
  packages: read
  actions: read

jobs:
  event-file:
    name: "Upload event file"
    runs-on: ubuntu-latest
    steps:
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Event File
        path: ${{ github.event_path }}
  build-pr:
    uses: ./.github/workflows/build-yocto.yml
    with:
      use_sstate: ${{ inputs.use_sstate || 'true' }}

  auto-merge:
    name: "Auto merge PR if automation label"
    runs-on: ubuntu-latest
    needs: build-pr
    # Only run on pull_request events (not workflow_dispatch), and only if the label is "automation"
    if: |
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'automation')
    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.SDK_LAYER_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --merge \
            --auto