name: Build on PR

on:
  pull_request:
  workflow_dispatch:
    inputs:
      use_sstate:
        description: "Use SSTATE cache"
        required: false
        default: "false"
      workflow_run_id:
        description: "Specific workflow run ID to check (optional, defaults to latest)"
        required: false
        type: string
        default: ""
      job_id:
        description: "Specific job ID to download artifacts from (optional, downloads from all jobs if not specified)"
        required: false
        type: string
        default: ""

permissions:
  checks: write
  pull-requests: write
  contents: read
  packages: read

jobs:
  event-file:
    name: "Upload event file"
    runs-on: ubuntu-latest
    steps:
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Event File
        path: ${{ github.event_path }}
  build-pr:
    uses: ./.github/workflows/build-yocto.yml
    with:
      use_sstate: ${{ inputs.use_sstate || 'true' }}
